{% extends 'cv/base.html' %}

{% block title %}Ajouter une Langue{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="max-width: 500px; width: 100%;">
        <h2 class="text-center mb-4">
            <i class="bi bi-translate"></i> Ajouter une Langue
        </h2>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">
                            <i class="bi bi-exclamation-triangle-fill"></i> {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary btn-lg w-100">
                🌍 Ajouter
            </button>
        </form>

        <a href="{% url 'dashboard' %}" class="btn btn-secondary mt-3 w-100">
            ⬅ Retour
        </a>
    </div>
</div>

<!-- Lien vers les icônes Bootstrap -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
{% endblock %}
